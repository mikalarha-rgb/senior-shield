name: Build Windows .exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install psutil Pillow pyinstaller

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name SeniorShield senior_shield.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeniorShield-exe
          path: dist/SeniorShield.exe
          retention-days: 30
