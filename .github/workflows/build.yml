name: Build Windows .exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install nuitka zstandard psutil Pillow twilio

      - name: Build .exe with Nuitka
        run: |
          python -m nuitka --onefile --windows-console-mode=disable --enable-plugin=tk-inter --assume-yes-for-downloads --output-filename=SeniorShield.exe senior_shield.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeniorShield-exe
          path: SeniorShield.exe
          retention-days: 30
